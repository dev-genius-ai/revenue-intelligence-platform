version: 2

models:
  - name: channel_performance
    description: >
      One row per conformed channel comparing first-touch and last-touch revenue,
      customers, content engagement, and campaign investment. All measures are
      aggregated exclusively from marts.
    columns:
      - name: channel_key
        description: Channel business key and model primary key.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_channel')
                field: channel_key
      - name: channel_name
        description: Human-readable channel name from dim_channel.
        data_tests:
          - not_null
      - name: channel_group
        description: Conformed channel grouping from dim_channel.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - social
                  - owned_content
                  - organic
                  - referral
                  - unknown
                  - other
      - name: first_touch_revenue
        description: Total revenue credited to the channel by first touch.
        data_tests:
          - not_null
      - name: last_touch_revenue
        description: Total revenue credited to the channel by last touch.
        data_tests:
          - not_null
      - name: first_touch_customers
        description: Distinct customers credited by first touch.
        data_tests:
          - not_null
      - name: last_touch_customers
        description: Distinct customers credited by last touch.
        data_tests:
          - not_null
      - name: first_touch_revenue_records
        description: Revenue records credited by first touch.
        data_tests:
          - not_null
      - name: last_touch_revenue_records
        description: Revenue records credited by last touch.
        data_tests:
          - not_null
      - name: content_count
        description: Content items published on the channel.
        data_tests:
          - not_null
      - name: views
        description: Content views generated by the channel.
        data_tests:
          - not_null
      - name: clicks
        description: Content clicks generated by the channel.
        data_tests:
          - not_null
      - name: click_through_rate
        description: Channel clicks divided by channel views.
      - name: campaign_count
        description: Campaigns associated with the channel.
        data_tests:
          - not_null
      - name: campaign_budget_usd
        description: Total campaign budget associated with the channel.
        data_tests:
          - not_null

  - name: campaign_performance
    description: >
      One row per campaign combining campaign ROI measures with conformed channel,
      company, and date descriptions. Portfolio-wide campaigns retain a null target
      company.
    columns:
      - name: campaign_id
        description: Campaign business key and model primary key.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('fct_campaign_roi')
                field: campaign_id
      - name: channel_key
        description: Foreign key to dim_channel.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_channel')
                field: channel_key
      - name: channel_name
        description: Human-readable channel name.
        data_tests:
          - not_null
      - name: target_company_id
        description: Optional foreign key to the targeted portfolio company.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_company')
                field: company_id
      - name: target_company_name
        description: Target company name; null for portfolio-wide campaigns.
      - name: start_date
        description: Campaign start date resolved through dim_time.
        data_tests:
          - not_null
      - name: end_date
        description: Campaign end date resolved through dim_time.
        data_tests:
          - not_null
      - name: budget_usd
        description: Campaign budget in US dollars.
        data_tests:
          - not_null
      - name: first_touch_attributed_revenue
        description: Campaign revenue under first-touch attribution.
        data_tests:
          - not_null
      - name: last_touch_attributed_revenue
        description: Campaign revenue under last-touch attribution.
        data_tests:
          - not_null
      - name: first_touch_customers
        description: Campaign customers under first-touch attribution.
        data_tests:
          - not_null
      - name: last_touch_customers
        description: Campaign customers under last-touch attribution.
        data_tests:
          - not_null
      - name: first_touch_roas
        description: First-touch revenue divided by budget.
        data_tests:
          - not_null
      - name: last_touch_roas
        description: Last-touch revenue divided by budget.
        data_tests:
          - not_null
      - name: first_touch_roi
        description: First-touch net return divided by budget.
        data_tests:
          - not_null
      - name: last_touch_roi
        description: Last-touch net return divided by budget.
        data_tests:
          - not_null
      - name: first_touch_cost_per_customer
        description: Budget divided by first-touch customers.
      - name: last_touch_cost_per_customer
        description: Budget divided by last-touch customers.
      - name: attribution_revenue_difference
        description: Last-touch attributed revenue minus first-touch revenue.
        data_tests:
          - not_null

  - name: company_revenue_analysis
    description: >
      One row per portfolio company summarizing revenue composition, customer
      volume, channel breadth, campaign-attributed revenue, and portfolio share.
    columns:
      - name: company_id
        description: Company business key and model primary key.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_company')
                field: company_id
      - name: company_name
        description: Human-readable company name.
        data_tests:
          - not_null
      - name: industry
        description: Portfolio company industry.
        data_tests:
          - not_null
      - name: total_revenue
        description: Total company revenue.
        data_tests:
          - not_null
      - name: recurring_revenue
        description: Revenue from recurring records.
        data_tests:
          - not_null
      - name: initial_revenue
        description: Revenue from initial non-recurring records.
        data_tests:
          - not_null
      - name: revenue_record_count
        description: Number of company revenue records.
        data_tests:
          - not_null
      - name: customer_count
        description: Distinct company customers generating revenue.
        data_tests:
          - not_null
      - name: first_touch_channel_count
        description: Distinct first-touch channels represented.
        data_tests:
          - not_null
      - name: last_touch_channel_count
        description: Distinct last-touch channels represented.
        data_tests:
          - not_null
      - name: first_touch_campaign_revenue
        description: Revenue with a validated first-touch campaign.
        data_tests:
          - not_null
      - name: last_touch_campaign_revenue
        description: Revenue with a validated last-touch campaign.
        data_tests:
          - not_null
      - name: average_revenue_per_customer
        description: Total revenue divided by distinct customers.
        data_tests:
          - not_null
      - name: portfolio_revenue_share
        description: Company's proportion of total portfolio revenue.
        data_tests:
          - not_null

  - name: monthly_revenue_customer_growth
    description: >
      One row per revenue month with revenue composition, active and new customer
      counts, and month-over-month absolute and percentage growth.
    columns:
      - name: month_key
        description: YYYYMM business key and model primary key.
        data_tests:
          - not_null
          - unique
      - name: month_date_key
        description: Foreign key to the month-start row in dim_time.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_time')
                field: date_key
      - name: month_start_date
        description: First calendar day of the revenue month.
        data_tests:
          - not_null
          - unique
      - name: total_revenue
        description: Revenue generated during the month.
        data_tests:
          - not_null
      - name: recurring_revenue
        description: Recurring revenue generated during the month.
        data_tests:
          - not_null
      - name: initial_revenue
        description: Initial non-recurring revenue generated during the month.
        data_tests:
          - not_null
      - name: revenue_record_count
        description: Revenue records generated during the month.
        data_tests:
          - not_null
      - name: active_customers
        description: Distinct customers generating revenue during the month.
        data_tests:
          - not_null
      - name: new_customers
        description: Active customers whose signup cohort equals the revenue month.
        data_tests:
          - not_null
      - name: revenue_change
        description: Absolute revenue change from the prior observed month.
      - name: revenue_growth_rate
        description: Revenue change divided by prior-month revenue.
      - name: customer_change
        description: Absolute active-customer change from the prior observed month.
      - name: customer_growth_rate
        description: Customer change divided by prior-month active customers.
