version: 2

sources:
  - name: raw
    description: >
      Immutable source-aligned tables loaded into DuckDB by the Python ingestion
      layer. Values in this schema have not been cleaned or attributed.
    schema: raw
    tables:
      - name: campaign_metadata
        description: >
          Campaign reference data containing channel, budget, active dates, and
          optional target company. One row represents one campaign.
        columns:
          - name: campaign_id
            description: Source campaign identifier.
          - name: campaign_name
            description: Human-readable campaign name.
          - name: channel
            description: Source marketing channel value.
          - name: budget_usd
            description: Campaign budget in US dollars.
          - name: start_date
            description: Source campaign start date string.
          - name: end_date
            description: Source campaign end date string.
          - name: target_company_id
            description: Optional portfolio company targeted by the campaign.

      - name: content_performance
        description: >
          Content-level engagement metrics and UTM metadata. One row represents
          one published content item.
        columns:
          - name: content_id
            description: Source content identifier.
          - name: channel
            description: Channel on which the content was published.
          - name: publish_date
            description: Source publication date string.
          - name: views
            description: Recorded content views.
          - name: clicks
            description: Recorded content clicks.
          - name: utm_source
            description: Optional source captured in the content UTM parameters.
          - name: utm_campaign
            description: Optional campaign captured in the content UTM parameters.

      - name: portfolio_revenue
        description: >
          Monthly user revenue generated by portfolio companies. One row
          represents one revenue event at user-company-month grain.
        columns:
          - name: revenue_id
            description: Source revenue event identifier.
          - name: company_id
            description: Portfolio company receiving the revenue.
          - name: user_id
            description: User associated with the revenue.
          - name: month
            description: Source revenue month in YYYY-MM format.
          - name: revenue_amount
            description: Revenue amount in US dollars.
          - name: is_recurring
            description: Whether the revenue follows the user's initial revenue event.

      - name: user_signups
        description: >
          User signup events with company, referral, UTM, first-touch, and
          last-touch context. One row represents one user.
        columns:
          - name: user_id
            description: Source user identifier.
          - name: signup_date
            description: Source signup date string.
          - name: company_id
            description: Portfolio company for which the user signed up.
          - name: referral_source
            description: Optional self-reported or recorded referral source.
          - name: utm_source
            description: Optional acquisition source from UTM parameters.
          - name: utm_medium
            description: Optional acquisition medium from UTM parameters.
          - name: utm_campaign
            description: Optional acquisition campaign from UTM parameters.
          - name: first_touch_channel
            description: Earliest recorded acquisition channel.
          - name: last_touch_channel
            description: Final recorded acquisition channel before signup.

models:
  - name: stg_campaign_metadata
    description: >
      Clean campaign reference data at one row per campaign. Empty strings become
      null, identifiers are standardized, dates are typed, and campaign names are
      converted into stable slugs. Assumes campaign_id is the source primary key.
    columns:
      - name: campaign_id
        description: Uppercase campaign identifier.
        data_tests:
          - not_null
          - unique
      - name: campaign_name
        description: Trimmed human-readable campaign name.
        data_tests:
          - not_null
      - name: campaign_slug
        description: >
          Lowercase underscore-delimited campaign name used to compare campaign
          metadata with UTM campaign values.
        data_tests:
          - not_null
          - unique
      - name: channel
        description: Normalized campaign channel.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - youtube
                  - twitter
                  - instagram
                  - newsletter
                  - podcast
                  - blog
      - name: budget_usd
        description: Campaign budget as DECIMAL(18,2).
        data_tests:
          - not_null
      - name: start_date
        description: Campaign start date parsed as a DATE.
        data_tests:
          - not_null
      - name: end_date
        description: Campaign end date parsed as a DATE.
        data_tests:
          - not_null
      - name: target_company_id
        description: >
          Uppercase target company identifier; null indicates a portfolio-wide
          campaign.
        data_tests:
          - accepted_values:
              arguments:
                values: [CTC-001, CTC-002, CTC-003, CTC-004]

  - name: stg_content_performance
    description: >
      Clean content performance data at one row per content item. The model types
      publication dates and engagement metrics while retaining content and UTM
      identifiers needed by later models. It does not infer missing attribution.
    columns:
      - name: content_id
        description: Uppercase content identifier.
        data_tests:
          - not_null
          - unique
      - name: channel
        description: Normalized publishing channel.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - youtube
                  - twitter
                  - instagram
                  - newsletter
                  - podcast
                  - blog
      - name: publish_date
        description: Content publication date parsed as a DATE.
        data_tests:
          - not_null
      - name: publish_month
        description: First day of the content publication month.
        data_tests:
          - not_null
      - name: views
        description: Content view count cast to BIGINT.
        data_tests:
          - not_null
      - name: clicks
        description: Content click count cast to BIGINT.
        data_tests:
          - not_null
      - name: utm_source
        description: Normalized optional UTM source; missing values remain null.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - youtube
                  - twitter
                  - instagram
                  - newsletter
                  - podcast
                  - blog
      - name: utm_campaign
        description: >
          Normalized optional UTM campaign slug; missing values remain null.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_campaign_metadata')
                field: campaign_slug

  - name: stg_portfolio_revenue
    description: >
      Clean revenue events at the unchanged source grain of one revenue_id per
      user-company-month event. Month values become DATEs and monetary values use
      fixed-point decimals. The model does not allocate or attribute revenue.
    columns:
      - name: revenue_id
        description: Uppercase revenue event identifier.
        data_tests:
          - not_null
          - unique
      - name: company_id
        description: Uppercase portfolio company identifier.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [CTC-001, CTC-002, CTC-003, CTC-004]
      - name: user_id
        description: Uppercase user identifier associated with the revenue event.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_user_signups')
                field: user_id
      - name: revenue_month
        description: First day of the revenue month parsed as a DATE.
        data_tests:
          - not_null
      - name: revenue_amount
        description: Revenue amount as DECIMAL(18,2).
        data_tests:
          - not_null
      - name: is_recurring
        description: Boolean recurring-revenue indicator.
        data_tests:
          - not_null

  - name: stg_user_signups
    description: >
      Clean signup data at one row per user. Identifiers, UTM values, referral
      sources, and touch channels are normalized without resolving conflicts or
      filling missing attribution values. Assumes user_id is the source primary key.
    columns:
      - name: user_id
        description: Uppercase user identifier.
        data_tests:
          - not_null
          - unique
      - name: signup_date
        description: User signup date parsed as a DATE.
        data_tests:
          - not_null
      - name: signup_month
        description: First day of the user's signup month.
        data_tests:
          - not_null
      - name: company_id
        description: Uppercase portfolio company identifier.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [CTC-001, CTC-002, CTC-003, CTC-004]
      - name: referral_source
        description: Normalized optional referral source; missing values remain null.
      - name: utm_source
        description: Normalized optional UTM source; missing values remain null.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - youtube
                  - twitter
                  - instagram
                  - newsletter
                  - podcast
                  - blog
                  - organic
                  - referral

      - name: utm_medium
        description: Normalized optional UTM medium; missing values remain null.
      - name: utm_campaign
        description: >
          Normalized optional UTM campaign slug; missing values remain null.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_campaign_metadata')
                field: campaign_slug
      - name: first_touch_channel
        description: >
          Normalized first-touch channel retained exactly as a separate
          attribution field; conflicts are not resolved in staging.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - youtube
                  - twitter
                  - instagram
                  - newsletter
                  - podcast
                  - blog
                  - organic
                  - referral
      - name: last_touch_channel
        description: >
          Normalized last-touch channel retained exactly as a separate
          attribution field; conflicts are not resolved in staging.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - youtube
                  - twitter
                  - instagram
                  - newsletter
                  - podcast
                  - blog
                  - organic
                  - referral

  - name: int_user_journeys
    description: >
      One row per signup user with independently resolved first-touch and
      last-touch channels, validated campaign matches, and attribution quality
      indicators. This model applies deterministic attribution fallbacks but does
      not join or aggregate revenue.
    columns:
      - name: user_id
        description: User identifier and model primary key.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_user_signups')
                field: user_id
      - name: company_id
        description: Portfolio company associated with the signup.
        data_tests:
          - not_null
      - name: signup_date
        description: Date on which the user signed up.
        data_tests:
          - not_null
      - name: first_touch_channel
        description: Normalized first-touch channel supplied by the signup source.
      - name: last_touch_channel
        description: Normalized last-touch channel supplied by the signup source.
      - name: utm_source
        description: Normalized signup UTM source, which may be null.
      - name: utm_medium
        description: Normalized signup UTM medium, which may be null.
      - name: utm_campaign
        description: Normalized signup UTM campaign slug, which may be null.
      - name: referral_source
        description: Normalized signup referral source, which may be null.
      - name: first_touch_resolved_channel
        description: >
          First-touch channel selected from first_touch_channel, utm_source,
          referral_source, then unknown.
        data_tests:
          - not_null
      - name: first_touch_attribution_reason
        description: Field that supplied the resolved first-touch channel.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - first_touch_channel
                  - utm_source
                  - referral_source
                  - unknown
      - name: last_touch_resolved_channel
        description: >
          Last-touch channel selected from last_touch_channel, utm_source,
          referral_source, then unknown.
        data_tests:
          - not_null
      - name: last_touch_attribution_reason
        description: Field that supplied the resolved last-touch channel.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - last_touch_channel
                  - utm_source
                  - referral_source
                  - unknown
      - name: has_channel_conflict
        description: >
          True when populated first-touch and last-touch channels differ.
        data_tests:
          - not_null
      - name: missing_utm_flag
        description: >
          True when any of UTM source, medium, or campaign is missing.
        data_tests:
          - not_null
      - name: first_touch_campaign_id
        description: >
          Campaign assigned to the first-touch path after all campaign validation
          rules pass; otherwise null.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_campaign_metadata')
                field: campaign_id
      - name: last_touch_campaign_id
        description: >
          Campaign assigned to the last-touch path after all campaign validation
          rules pass; otherwise null.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_campaign_metadata')
                field: campaign_id
      - name: first_touch_campaign_match_status
        description: Campaign match outcome for the first-touch path.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - matched
                  - missing_utm_campaign
                  - unmatched_or_invalid
      - name: last_touch_campaign_match_status
        description: Campaign match outcome for the last-touch path.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - matched
                  - missing_utm_campaign
                  - unmatched_or_invalid
      - name: campaign_match_status
        description: Combined campaign match outcome across both attribution paths.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - matched_both
                  - matched_first_touch_only
                  - matched_last_touch_only
                  - missing_utm_campaign
                  - unmatched_or_invalid
      - name: attribution_confidence
        description: >
          Overall high, medium, or low quality classification based on resolved
          channels, campaign validation, UTM completeness, and channel conflicts.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [high, medium, low]

  - name: int_attributed_revenue
    description: >
      Revenue events enriched with both first-touch and last-touch journey
      outcomes. The source revenue grain is preserved at exactly one row per
      revenue_id; no revenue allocation or aggregation occurs in this model.
    columns:
      - name: revenue_id
        description: Revenue event identifier and model primary key.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_portfolio_revenue')
                field: revenue_id
      - name: user_id
        description: User associated with the revenue event.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_user_signups')
                field: user_id
          - relationships:
              arguments:
                to: ref('int_user_journeys')
                field: user_id
      - name: company_id
        description: Portfolio company receiving the revenue.
        data_tests:
          - not_null
      - name: revenue_amount
        description: Unallocated source revenue amount.
        data_tests:
          - not_null
      - name: revenue_month
        description: First day of the source revenue month.
        data_tests:
          - not_null
      - name: is_recurring
        description: Source recurring-revenue indicator.
        data_tests:
          - not_null
      - name: signup_date
        description: Signup date inherited from the matched user journey.
        data_tests:
          - not_null
      - name: first_touch_channel
        description: Original normalized first-touch channel from staging.
      - name: last_touch_channel
        description: Original normalized last-touch channel from staging.
      - name: first_touch_resolved_channel
        description: Resolved channel for first-touch attribution.
        data_tests:
          - not_null
      - name: last_touch_resolved_channel
        description: Resolved channel for last-touch attribution.
        data_tests:
          - not_null
      - name: first_touch_attribution_reason
        description: Field used to resolve the first-touch channel.
        data_tests:
          - not_null
      - name: last_touch_attribution_reason
        description: Field used to resolve the last-touch channel.
        data_tests:
          - not_null
      - name: first_touch_campaign
        description: Validated campaign identifier for the first-touch path.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_campaign_metadata')
                field: campaign_id
      - name: last_touch_campaign
        description: Validated campaign identifier for the last-touch path.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_campaign_metadata')
                field: campaign_id
      - name: has_channel_conflict
        description: User-level first-touch versus last-touch conflict flag.
        data_tests:
          - not_null
      - name: missing_utm_flag
        description: User-level UTM completeness flag.
        data_tests:
          - not_null
      - name: first_touch_campaign_match_status
        description: First-touch campaign validation outcome.
        data_tests:
          - not_null
      - name: last_touch_campaign_match_status
        description: Last-touch campaign validation outcome.
        data_tests:
          - not_null
      - name: campaign_match_status
        description: Combined campaign validation outcome.
        data_tests:
          - not_null
      - name: attribution_confidence
        description: User-level attribution quality classification.
        data_tests:
          - not_null
      - name: missing_journey_flag
        description: >
          True when no user journey joined to a revenue event. Expected to remain
          false because ingestion validates user referential integrity.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [false]
